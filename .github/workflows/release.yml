name: Release

# Tag-driven release. A tag `vX.Y.Z` (or `vX.Y.Z-alpha.N`, `-beta.N`, `-rc.N`)
# stamps the workspace package version and exact internal crates.io requirements.
# One synced version drives crates.io (code2graph, code2graph-query, code2graph-cli),
# PyPI, and npm.
on:
  push:
    tags: ["v*"]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    name: Validate version tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
      - name: Validate release template and tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          if [[ ! "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            echo "::error::Invalid tag '$TAG'. Expected vX.Y.Z or vX.Y.Z-(alpha|beta|rc).N"
            exit 1
          fi
          # Development manifests deliberately use 0.0.0, which is never
          # published. Tagged jobs stamp every package requirement from this tag.
          python3 scripts/stamp-release.py --check-template
          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG_VERSION"

  ci:
    name: Test
    needs: validate-version
    uses: ./.github/workflows/test.yml

  publish-crates:
    name: Publish to crates.io
    needs: [validate-version, ci]
    runs-on: ubuntu-latest
    environment: crates.io
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Stamp package versions and exact internal requirements
        run: python3 scripts/stamp-release.py "${{ needs.validate-version.outputs.version }}"
      - name: Publish crates in dependency order
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-version.outputs.version }}"
          USER_AGENT="code2graph-ci (github.com/nodedb-lab/code2graph)"

          crate_available() {
            curl -sf -H "User-Agent: $USER_AGENT" \
              "https://crates.io/api/v1/crates/$1/$VERSION" > /dev/null 2>&1
          }

          wait_for_crate() {
            local crate="$1"
            for attempt in $(seq 1 30); do
              if crate_available "$crate"; then
                echo "$crate@$VERSION is available from crates.io"
                return 0
              fi
              echo "Waiting for $crate@$VERSION to become available ($attempt/30)"
              sleep 10
            done
            echo "::error::$crate@$VERSION was not available from crates.io after 300 seconds; refusing to publish a dependent crate."
            return 1
          }

          publish_crate() {
            local crate="$1"
            if crate_available "$crate"; then
              echo "$crate@$VERSION already published — skipping"
            else
              # Keep cargo's package verification enabled before every publish.
              cargo publish -p "$crate" --allow-dirty
            fi
            wait_for_crate "$crate"
          }

          publish_crate code2graph
          publish_crate code2graph-query
          publish_crate code2graph-cli

  build-sdist:
    name: Build sdist
    # Binding crates depend on the query crate; build only after its exact
    # release is visible so release artifacts are validated in publish order.
    needs: [validate-version, publish-crates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Stamp package versions and exact internal requirements
        run: python scripts/stamp-release.py "${{ needs.validate-version.outputs.version }}"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m bindings/python/Cargo.toml
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  build-wheels:
    name: Build wheel (${{ matrix.target }})
    needs: [validate-version, publish-crates]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
          # Intel macOS hosted runners (macos-13) are retired; cross-compile the
          # x86_64 wheel on an Apple Silicon runner (the target is set above).
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Stamp package versions and exact internal requirements
        run: python scripts/stamp-release.py "${{ needs.validate-version.outputs.version }}"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist -m bindings/python/Cargo.toml
          sccache: "true"
          # tree-sitter grammars' generated parser.c uses C99 for-loop init and
          # some scanners use C11 static_assert; the manylinux cross-GCC defaults
          # to C89. Force C11 inside the build container (linux/docker only).
          docker-options: ${{ contains(matrix.target, 'linux') && '-e CFLAGS=-std=gnu11' || '' }}
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  publish-pypi:
    name: Publish to PyPI
    needs: [validate-version, publish-crates, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  build-node:
    name: Build addon (${{ matrix.target }})
    needs: [validate-version, publish-crates]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            napi_cross: true
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            zig: true
          # Intel macOS runners are retired; cross-compile x86_64 on Apple Silicon.
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Stamp package versions and exact internal requirements
        run: python scripts/stamp-release.py "${{ needs.validate-version.outputs.version }}"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: node-${{ matrix.target }}
      - name: Install zig (musl cross-compile)
        if: matrix.zig
        run: |
          pip install ziglang
          cargo install --locked cargo-zigbuild
      - name: Install napi cross-toolchain (linux aarch64)
        if: matrix.napi_cross
        run: npm install -g @napi-rs/cross-toolchain
      - name: Install deps
        working-directory: bindings/node
        run: npm ci
      - name: Build and regenerate addon bindings
        working-directory: bindings/node
        # tree-sitter grammars need C11 (for-loop init / static_assert); the napi
        # aarch64 cross-GCC defaults to C89. Harmless on the modern gnu/clang/zig
        # targets; omitted on Windows, whose MSVC rejects -std=gnu11.
        env:
          CFLAGS: ${{ !contains(matrix.target, 'windows') && '-std=gnu11' || '' }}
        run: |
          npx napi build --platform --release --target ${{ matrix.target }} ${{ matrix.zig && '-x' || '' }} ${{ matrix.napi_cross && '--use-napi-cross' || '' }}
          npm run harden-loader
          npm run harden-types
      - name: Test regenerated native binding and loader policy
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        working-directory: bindings/node
        run: npm test
      - uses: actions/upload-artifact@v7
        with:
          name: node-${{ matrix.target }}
          path: bindings/node/*.node

  publish-npm:
    name: Publish to npm
    needs: [validate-version, build-node, publish-crates]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install deps
        working-directory: bindings/node
        run: npm ci
      - name: Download addon artifacts
        uses: actions/download-artifact@v8
        with:
          path: bindings/node/artifacts
          pattern: node-*
          merge-multiple: true
      - name: Stamp version
        working-directory: bindings/node
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
      - name: Assemble platform packages
        working-directory: bindings/node
        run: |
          npx napi create-npm-dirs --npm-dir ./npm
          npx napi artifacts --output-dir ./artifacts --npm-dir ./npm
          npx napi prepublish -t npm --npm-dir ./npm --skip-optional-publish
          npm run harden-loader
          npm run harden-types
      - name: Publish (idempotent, with provenance)
        working-directory: bindings/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          publish_pkg() {
            local dir="$1" name ver
            name=$(jq -r .name "$dir/package.json")
            ver=$(jq -r .version "$dir/package.json")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "$name@$ver already published — skipping"
            else
              npm publish "$dir" --access public
            fi
          }
          for dir in npm/*/; do publish_pkg "$dir"; done
          publish_pkg .

  github-release:
    name: GitHub release
    needs: [validate-version, publish-crates, publish-pypi, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ needs.validate-version.outputs.is_prerelease == 'true' }}
